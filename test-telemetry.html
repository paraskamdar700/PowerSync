<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerSync — Telemetry Test Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-card: #1a1d27;
            --bg-card-hover: #22263a;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --green: #00b894;
            --green-glow: rgba(0, 184, 148, 0.25);
            --red: #e17055;
            --yellow: #fdcb6e;
            --text-primary: #f0f0f5;
            --text-secondary: #8a8fa8;
            --border: #2d3148;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: var(--text-secondary);
            margin-top: 0.4rem;
            font-size: 0.9rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--red);
            transition: all 0.3s;
        }
        .status-dot.connected {
            background: var(--green);
            box-shadow: 0 0 12px var(--green-glow);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 6px var(--green-glow); }
            50% { box-shadow: 0 0 18px var(--green-glow); }
        }
        .status-text {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.2rem;
            max-width: 1000px;
            margin: 0 auto 2rem;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #a29bfe);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .metric-card.flash::before { opacity: 1; }
        .metric-card.flash {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .metric-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .metric-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            transition: color 0.3s;
        }
        .metric-unit {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 4px;
        }
        .metric-node {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .controls {
            max-width: 1000px;
            margin: 0 auto 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-danger {
            background: rgba(225, 112, 85, 0.15);
            color: var(--red);
            border: 1px solid rgba(225, 112, 85, 0.3);
        }
        .btn-danger:hover { background: rgba(225, 112, 85, 0.25); }
        .btn-success {
            background: rgba(0, 184, 148, 0.15);
            color: var(--green);
            border: 1px solid rgba(0, 184, 148, 0.3);
        }
        .btn-success:hover { background: rgba(0, 184, 148, 0.25); }

        .log-section {
            max-width: 1000px;
            margin: 0 auto;
        }
        .log-section h3 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.8rem;
        }
        .log-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        .log-entry {
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(45, 49, 72, 0.5);
            animation: fadeIn 0.3s ease;
        }
        .log-entry:last-child { border-bottom: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .log-time { color: var(--text-secondary); }
        .log-connected { color: var(--green); }
        .log-data { color: var(--accent); }
        .log-error { color: var(--red); }
        .log-disconnected { color: var(--yellow); }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ PowerSync Telemetry Test</h1>
        <p>Real-time IoT power monitoring via WebSocket</p>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Disconnected</span>
    </div>

    <div class="metrics-grid">
        <div class="metric-card" id="cardNode">
            <div class="metric-label">Node ID</div>
            <div class="metric-value metric-node" id="nodeId">—</div>
        </div>
        <div class="metric-card" id="cardVoltage">
            <div class="metric-label">Voltage</div>
            <div class="metric-value" id="voltage">0.00<span class="metric-unit">V</span></div>
        </div>
        <div class="metric-card" id="cardCurrent">
            <div class="metric-label">Current</div>
            <div class="metric-value" id="current">0.00<span class="metric-unit">A</span></div>
        </div>
        <div class="metric-card" id="cardPower">
            <div class="metric-label">Power</div>
            <div class="metric-value" id="power">0.00<span class="metric-unit">W</span></div>
        </div>
        <div class="metric-card" id="cardEnergy">
            <div class="metric-label">Energy</div>
            <div class="metric-value" id="energy">0.00<span class="metric-unit">kWh</span></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" onclick="connectWS()">🔌 Connect WebSocket</button>
        <button class="btn btn-danger" onclick="disconnectWS()">✂️ Disconnect</button>
        <button class="btn btn-success" onclick="sendTestData()">📡 Send Test Data (curl)</button>
    </div>

    <div class="log-section">
        <h3>📋 Event Log</h3>
        <div class="log-container" id="logContainer">
            <div class="empty-state">Click "Connect WebSocket" to start listening for telemetry data…</div>
        </div>
    </div>

    <script>
        let ws = null;
        const WS_URL = "ws://localhost:8081/ws/telemetry";
        const API_URL = "http://localhost:8081/esp";

        function connectWS() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addLog("Already connected!", "log-error");
                return;
            }

            addLog("Connecting to " + WS_URL + " …", "log-data");
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                document.getElementById("statusDot").classList.add("connected");
                document.getElementById("statusText").textContent = "Connected";
                addLog("✅ WebSocket connected successfully", "log-connected");
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                addLog("📥 Received: " + event.data, "log-data");
                updateMetrics(data);
            };

            ws.onclose = () => {
                document.getElementById("statusDot").classList.remove("connected");
                document.getElementById("statusText").textContent = "Disconnected";
                addLog("🔌 WebSocket disconnected", "log-disconnected");
            };

            ws.onerror = (err) => {
                addLog("❌ WebSocket error — is the server running on port 8081?", "log-error");
            };
        }

        function disconnectWS() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function updateMetrics(data) {
            setValue("nodeId", data.nodeId || "—");
            setValue("voltage", (data.voltage || 0).toFixed(2) + '<span class="metric-unit">V</span>');
            setValue("current", (data.current || 0).toFixed(2) + '<span class="metric-unit">A</span>');
            setValue("power",   (data.power   || 0).toFixed(2) + '<span class="metric-unit">W</span>');
            setValue("energy",  (data.energy  || 0).toFixed(2) + '<span class="metric-unit">kWh</span>');

            // flash animation
            document.querySelectorAll(".metric-card").forEach(card => {
                card.classList.add("flash");
                setTimeout(() => card.classList.remove("flash"), 600);
            });
        }

        function setValue(id, html) {
            document.getElementById(id).innerHTML = html;
        }

        function addLog(message, className) {
            const container = document.getElementById("logContainer");
            const empty = container.querySelector(".empty-state");
            if (empty) empty.remove();

            const now = new Date().toLocaleTimeString();
            const entry = document.createElement("div");
            entry.className = "log-entry " + (className || "");
            entry.innerHTML = '<span class="log-time">[' + now + ']</span> ' + message;
            container.prepend(entry);

            // keep only last 50 entries
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        async function sendTestData() {
            const testPayload = {
                nodeId: "ESP-" + String(Math.floor(Math.random() * 9000) + 1000),
                voltage: +(220 + Math.random() * 20).toFixed(2),
                current: +(0.5 + Math.random() * 5).toFixed(2),
                power:   +(100 + Math.random() * 900).toFixed(2),
                energy:  +(Math.random() * 50).toFixed(2)
            };

            addLog("📤 Sending test POST to /esp: " + JSON.stringify(testPayload), "log-data");

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(testPayload)
                });
                const text = await res.text();
                addLog("✅ Server response: " + text, "log-connected");
            } catch (err) {
                addLog("❌ POST failed: " + err.message + " — is the server running?", "log-error");
            }
        }
    </script>
</body>
</html>
